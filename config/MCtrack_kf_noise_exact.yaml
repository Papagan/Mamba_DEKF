# MCTrack KF noise exact mapping for current pure_dekf consumption.
#
# Mapping rules from config/MCtrack_config.yaml:
# 1. POSE Q [x, y, vx, vy] -> current POS_PER_CAT [x, y, z, vx, vy, vz]
#    We preserve x/y and vx/vy exactly, and mirror them to z/vz conservatively.
# 2. SIZE Q currently has no velocity state in this project, so MCTrack's
#    [l, w, vl, vw] process noise is mapped to [l, w, h] using the spatial
#    components only, with h mirrored from the lw scale.
# 3. MCTrack R values are covariance diagonals. Current DEKF_BASE_NOISE expects
#    standard deviations, so all measurement variances are square-rooted.
# 4. CONDITIONAL_NOISE is disabled to preserve MCTrack's static-KF behavior.

DEKF_BASE_NOISE:
  Q:
    POS: [0.5, 0.5, 0.5, 1.5, 1.5, 1.5]
    POS_PER_CAT:
      0: [0.5, 0.5, 0.5, 1.5, 1.5, 1.5]
      1: [1.5, 1.5, 1.5, 1.5, 1.5, 1.5]
      2: [0.3, 0.3, 0.3, 1.0, 1.0, 1.0]
      3: [0.5, 0.5, 0.5, 4.0, 4.0, 4.0]
      4: [0.5, 0.5, 0.5, 1.5, 1.5, 1.5]
      5: [0.3, 0.3, 0.3, 0.1, 0.1, 0.1]
      6: [0.1, 0.1, 0.1, 2.0, 2.0, 2.0]
    SIZ: [0.5, 0.5, 0.5]
    ORI: [0.1]
  R:
    POS_STD_XY:
      - [0.8367, 0.8367]
      - [1.4142, 1.4142]
      - [0.3162, 0.3162]
      - [0.3162, 0.3162]
      - [1.2247, 1.2247]
      - [1.4142, 1.4142]
      - [1.2247, 1.2247]
    POS_STD_Z: [0.8367, 1.4142, 0.3162, 0.3162, 1.2247, 1.4142, 1.2247]
    SIZ_STD_LW:
      - [1.4142, 1.4142]
      - [1.4142, 1.4142]
      - [1.4142, 1.4142]
      - [1.4142, 1.4142]
      - [1.4142, 1.4142]
      - [1.4142, 1.4142]
      - [1.4142, 1.4142]
    SIZ_STD_H: [1.4142, 1.4142, 1.4142, 1.4142, 1.4142, 1.4142, 1.4142]
    VEL_STD_XY:
      - [0.7071, 0.7071]
      - [1.8708, 1.8708]
      - [1.0000, 1.0000]
      - [0.3162, 0.3162]
      - [22.3607, 22.3607]
      - [1.5811, 1.5811]
      - [2.0000, 2.0000]
    ORI_STD: [0.4472, 0.4472, 0.4472, 0.4472, 0.4472, 0.4472, 0.4472]
  CONDITIONAL_NOISE:
    ENABLED: false
  FUSION:
    STRICT_RATIO: {0: 2.0, 1: 2.0, 2: 1.5, 3: 1.5, 4: 2.0, 5: 2.0, 6: 2.0}
  RESIDUAL_ANCHOR:
    ENABLED: false
