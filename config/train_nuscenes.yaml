# ============================================================
# Mamba-Decoupled-EKF Track — Training Configuration (nuScenes)
# ============================================================

# ---- Data ----
DATA:
  NUSC_VERSION: v1.0-trainval
  NUSC_DATAROOT: /root/autodl-tmp/data/nuscenes/datasets/
  TRAIN_SPLIT: train
  VAL_SPLIT: val
  TRACKLET_CACHE_DIR: /root/autodl-tmp/data/training_cache/nuscenes/
  CATEGORY_FILTER: null   # null = all categories; or ["car", "pedestrian"]

# ---- Model (TemporalMamba) ----
MODEL:
  D_MODEL: 64
  D_STATE: 16
  D_CONV: 4
  EXPAND: 2
  N_MAMBA_LAYERS: 3
  EMBED_DIM: 32
  HISTORY_LEN: 5            # reduced from 10; 5+5=10 frame minimum per sample
  MIN_DIAG_Q: 0.1           # floor on Cholesky diagonal for position Q head
  MIN_DIAG_R: 0.1           # floor on Cholesky diagonal for position R head

# ---- Training ----
TRAINING:
  BATCH_SIZE: 128
  NUM_WORKERS: 4
  EPOCHS: 100
  LR: 1.0e-3
  WEIGHT_DECAY: 1.0e-4
  WARMUP_EPOCHS: 3
  GRAD_CLIP_NORM: 1.0
  LOG_EVERY: 50
  SAVE_EVERY: 10
  SAVE_DIR: checkpoints/mamba_dekf/
  AUTO_UNSEAL_EPOCH: 40          # epoch at which to auto-toggle cost to "full"
  INFERENCE_CONFIG: config/nuscenes.yaml   # which inference config to update
  ROLLOUT_STEPS: 5               # KF auto-regressive rollout depth (1 = single-step)

# ---- Loss ----
LOSS:
  W_POS: 1.0
  W_SIZ: 0.5
  W_ORI: 5.0            # Von Mises loss weight (reduced from 50; VM loss is ~0.1-1.0 vs old NLL ~-1.0)
  LAMBDA_CONTRAST: 0.1
  INFONCE_TEMPERATURE: 0.07
  PHYSICS_SCALE: 50.0   # global multiplier for state losses vs contrastive
