# ============================================================
# Mamba-Decoupled-EKF Track — Training Configuration (nuScenes)
# ============================================================

# ---- Data ----
DATA:
  NUSC_VERSION: v1.0-trainval
  NUSC_DATAROOT: /root/autodl-tmp/data/nuscenes/datasets/
  TRAIN_SPLIT: train
  VAL_SPLIT: val
  TRAIN_SOURCE: gt          # gt / det
  VAL_SOURCE: gt            # gt / det
  TRACKLET_CACHE_DIR: /root/autodl-tmp/data/training_cache/nuscenes/
  TRAIN_TRACKLET_PKL: null  # required when TRAIN_SOURCE=det
  VAL_TRACKLET_PKL: null    # required when VAL_SOURCE=det
  REQUIRE_CURRENT_MATCH: true
  MIN_HISTORY_MATCH_RATIO: 0.25
  CATEGORY_FILTER: null   # null = all categories; or ["car", "pedestrian"]

# ---- Model (TemporalMamba) ----
# Scale-up schemes (A=conservative, B=aggressive). Both keep input features same,
# only Mamba backbone scales. MAMBA_LR must be adjusted inversely with depth.
#
# Current:   3 layers,  D_MODEL=64,  ~91K params,  MAMBA_LR=5e-5  (baseline)
# Scheme A:  5 layers,  D_MODEL=64,  ~120K params, MAMBA_LR=3e-5  (recommended)
# Scheme B:  6 layers,  D_MODEL=96,  ~250K params, MAMBA_LR=2e-5  (heavy, 2x memory)
#
# To switch: uncomment the desired block and comment the other.
MODEL:
  # ---- Baseline (3 layers, ~91K params) ----
  # D_MODEL: 64
  # D_STATE: 16
  # D_CONV: 4
  # EXPAND: 2
  # N_MAMBA_LAYERS: 3
  # EMBED_DIM: 32
  # ---- Scheme A: conservative scale-up (5 layers, ~120K params, active) ----
  D_MODEL: 96
  D_STATE: 24
  D_CONV: 4
  EXPAND: 2
  N_MAMBA_LAYERS: 6
  EMBED_DIM: 32
  # ---- Scheme B: aggressive scale-up (higher MAMBA_LR risk → reduce to 2e-5) ----
  # D_MODEL: 96
  # D_STATE: 24
  # D_CONV: 4
  # EXPAND: 2
  # N_MAMBA_LAYERS: 6
  # EMBED_DIM: 64
  HISTORY_LEN: 8            # reduced from 10; 5+5=10 frame minimum per sample
  NUM_CLASSES: 10            # number of categories for size noise embeddings
  MIN_DIAG_Q: 0.1           # floor on Cholesky diagonal for position Q head
  MIN_DIAG_R: 0.1           # floor on Cholesky diagonal for position R head
  MIN_DIAG_SIZ: 0.15        # floor on size noise diagonal (prevents NLL→-∞ collapse)
  MIN_KAPPA: 0.5            # floor on kappa (prevents R_ori→∞, degenerate kappa→0)

# ---- Training ----
TRAINING:
  BATCH_SIZE: 128
  NUM_WORKERS: 4
  EPOCHS: 100
  LR: 5.0e-4                # base LR for projection/head layers; slightly lower to stabilise head/noise coupling
  MAMBA_LR: 3.0e-5          # lower LR for Mamba SSM backbone (3e-5 for 5 layers)
  WEIGHT_DECAY: 1.0e-4
  WARMUP_EPOCHS: 3             # LR scheduler warmup
  WARMUP_UNCERTAINTY_EPOCHS: 8 # detach Q/R/kappa longer so state backbone stabilises before uncertainty learning
  WARMUP_TRANSITION_EPOCHS: 8  # slower smooth unfreeze (alpha ramp 0->1) after uncertainty warmup
  GRAD_CLIP_NORM: 1.0
  LOG_EVERY: 50
  SAVE_EVERY: 10
  SAVE_DIR: checkpoints/mamba_dekf/
  AUTO_UNSEAL_EPOCH: 25          # epoch at which to auto-toggle cost to "full"
  INFERENCE_CONFIG: config/nuscenes.yaml   # which inference config to update
  ROLLOUT_STEPS: 4               # KF auto-regressive rollout depth (1 = single-step)
  NOISE_MAP:                     # Category-specific noise injection (from docs/noise.log)
    # Order: [Car, Pedestrian, Bicycle, Motorcycle, Bus, Trailer, Truck]
    POS_STD_XY:
      - [0.5210, 0.5045]
      - [0.2745, 0.2731]
      - [0.5562, 0.5444]
      - [0.8646, 0.8695]
      - [1.3037, 1.2327]
      - [0.9590, 0.8735]
      - [0.6580, 0.6269]
    SIZ_STD_LW:
      - [0.2417, 0.0799]
      - [0.0567, 0.0422]
      - [0.1118, 0.0661]
      - [0.1866, 0.0860]
      - [1.2094, 0.1465]
      - [1.9336, 0.1782]
      - [0.7685, 0.1569]
    VEL_STD_XY:
      - [0.7551, 0.7017]
      - [0.2494, 0.2409]
      - [0.3933, 0.3942]
      - [0.8261, 0.8865]
      - [1.2134, 1.1046]
      - [0.4770, 0.3982]
      - [0.6409, 0.6169]
    ORI_STD: [0.50, 0.91, 0.86, 0.96, 0.48, 0.53, 0.45]
    MEAS_MULTIPLIER: 0.7

BASE_NOISE:
  Q:
    POS: [0.5, 0.5, 0.5, 1.5, 1.5, 1.5]
    POS_PER_CAT:
      0: [0.2, 0.2, 0.2, 1.0, 1.0, 1.0]
      1: [1.5, 1.5, 1.5, 1.5, 1.5, 1.5]
      2: [0.3, 0.3, 0.3, 1.0, 1.0, 1.0]
      3: [0.5, 0.5, 0.5, 4.0, 4.0, 4.0]
      4: [0.5, 0.5, 0.5, 1.5, 1.5, 1.5]
      5: [0.3, 0.3, 0.3, 0.1, 0.1, 0.1]
      6: [0.1, 0.1, 0.1, 2.0, 2.0, 2.0]
    SIZ: [0.05, 0.05, 0.05]
    ORI: [0.1]
  R:
    POS_STD_XY:
      - [0.5210, 0.5045]
      - [0.2745, 0.2731]
      - [0.5562, 0.5444]
      - [0.8646, 0.8695]
      - [1.3037, 1.2327]
      - [0.9590, 0.8735]
      - [0.6580, 0.6269]
    SIZ_STD_LW:
      - [0.2417, 0.0799]
      - [0.0567, 0.0422]
      - [0.1118, 0.0661]
      - [0.1866, 0.0860]
      - [1.2094, 0.1465]
      - [1.9336, 0.1782]
      - [0.7685, 0.1569]
    VEL_STD_XY:
      - [0.7551, 0.7017]
      - [0.2494, 0.2409]
      - [0.3933, 0.3942]
      - [0.8261, 0.8865]
      - [1.2134, 1.1046]
      - [0.4770, 0.3982]
      - [0.6409, 0.6169]
    ORI_STD: [0.50, 0.91, 0.86, 0.96, 0.48, 0.53, 0.45]
  CONDITIONAL_NOISE:
    ENABLED: true
    SCORE_WEIGHT: 0.8
    MISS_WEIGHT: 0.8
    RANGE_WEIGHT: 0.3
    SPEED_WEIGHT: 0.2
    YAW_RATE_WEIGHT: 0.2
    SIZE_SCORE_WEIGHT: 0.4
    SIZE_MISS_WEIGHT: 0.2
    RANGE_REF: 30.0
    SPEED_REF: 15.0
    YAW_RATE_REF: 0.5
    MIN_SCALE: 0.75
    MAX_SCALE: 2.5
  RESIDUAL_ANCHOR:
    ENABLED: true
    TARGETS: ["Q_pos", "R_pos", "R_siz", "R_ori"]
    MIN_STD_RATIO: 0.60
    MAX_STD_RATIO: 1.80
  DETECTION_UPDATE:
    ENABLED: true
    MISS_R_SCALE: 1000.0

# ---- Loss ----
LOSS:
  W_POS: 5.0
  W_SIZ: 1.0            # reduced: raw_r_siz init is very negative, don't amplify
  W_ORI: 1.5            # Von Mises NLL range ~0.1-1.0, no need for 50x
  W_VEL: 0.3            # velocity NLL weight (≤ W_POS; constant-vel GT is approximate)
  W_NIS: 0.1            # NIS calibration weight (innovation consistency)
  VEL_WARMUP_EPOCHS: 1  # delay vel NLL for first N epochs after uncertainty-unseal
  LAMBDA_CONTRAST: 0.3
  INFONCE_TEMPERATURE: 0.07
  HARD_NEGATIVE_TOPK: 32
  # Class reweighting for hard/noisy categories:
  # [car, pedestrian, bicycle, motorcycle, bus, trailer, truck]
  CLASS_WEIGHTS: [1.0, 1.1, 1.3, 1.5, 1.2, 1.4, 1.1]
  PHYSICS_SCALE: 5.0    # reduced from 20: let pos gradient survive against siz
