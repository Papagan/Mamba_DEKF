# ============================================================
# Mamba-Decoupled-EKF Track — Training Configuration (nuScenes)
# ============================================================

# ---- Data ----
DATA:
  NUSC_VERSION: v1.0-trainval
  NUSC_DATAROOT: root/autodl-tmp/data/nuscenes/datasets/
  TRAIN_SPLIT: train
  VAL_SPLIT: val
  TRACKLET_CACHE_DIR: root/autodl-tmp/data/training_cache/nuscenes/
  CATEGORY_FILTER: null   # null = all categories; or ["car", "pedestrian"]

# ---- Model (TemporalMamba) ----
MODEL:
  D_MODEL: 64
  D_STATE: 16
  D_CONV: 4
  EXPAND: 2
  N_MAMBA_LAYERS: 2
  EMBED_DIM: 32
  HISTORY_LEN: 10

# ---- Training ----
TRAINING:
  BATCH_SIZE: 128
  NUM_WORKERS: 4
  EPOCHS: 50
  LR: 1.0e-3
  WEIGHT_DECAY: 1.0e-4
  WARMUP_EPOCHS: 3
  GRAD_CLIP_NORM: 1.0
  LOG_EVERY: 50
  SAVE_EVERY: 5
  SAVE_DIR: checkpoints/mamba_dekf/

# ---- Loss ----
LOSS:
  W_POS: 1.0
  W_SIZ: 0.5
  W_ORI: 0.5
  LAMBDA_CONTRAST: 0.1
  INFONCE_TEMPERATURE: 0.07
