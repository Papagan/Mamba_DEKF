# ------------------------------------------------------------------------
# Experimental Mamba multi-head closure branch for nuScenes single-stage eval.
# This file preserves the frozen 0.739 baseline geometry / suppressor path and
# only switches the uncertainty branch to prior-conditioned Mamba closure mode.
# ------------------------------------------------------------------------

DATASET: "nuscenes"

SPLIT: "val"
DETECTOR: centerpoint
DATASET_ROOT: "/root/autodl-tmp/data/nuscenes/datasets/"
DETECTIONS_ROOT: "/root/autodl-tmp/data/base_version/nuscenes/"
SAVE_PATH: "/root/autodl-tmp/results/nuscenes/"
TRACKING_MODE: 'ONLINE'
FILTER_MODE: 'mamba_multihead_closure'
TRACKER_COMPAT_MODE: 'mctrack'
MCTRACK_EXACT_MATCHED_UPDATE: true
MCTRACK_EXACT_MATCHED_UPDATE_CLASSES: [5, 6]
MCTRACK_EXACT_UNMATCH_UPDATE: true
MCTRACK_EXACT_UNMATCH_UPDATE_CLASSES: [5, 6]
IS_RV_MATCHING: False
FRAME_RATE: 2
CATEGORY_LIST: ["car", "pedestrian", "bicycle", "motorcycle", "bus", "trailer", "truck"]
CATEGORY_MAP_TO_NUMBER : {
    "car": 0,
    "pedestrian": 1,
    "bicycle": 2,
    "motorcycle": 3,
    "bus": 4,
    "trailer": 5,
    "truck": 6,
}

MAMBA:
  CHECKPOINT_PATH: "checkpoints/mamba_dekf/best.pt"
  D_MODEL: 96
  D_STATE: 24
  D_CONV: 4
  EXPAND: 2
  N_MAMBA_LAYERS: 6
  EMBED_DIM: 64
  HISTORY_LEN: 8
  MAX_BATCH_SIZE: 256
  MIN_DIAG_Q: 0.1
  MIN_DIAG_R: 0.1
  MIN_DIAG_SIZ: 0.15
  MIN_KAPPA: 0.5
  NUM_CLASSES: 7

RESIDUAL_HISTORY:
  MIN_HISTORY_LEN: 4
  MAX_HISTORY_LEN: 8
  CLASS_WINDOW:
    car:        {MIN_HISTORY_LEN: 4, MAX_HISTORY_LEN: 8}
    pedestrian: {MIN_HISTORY_LEN: 4, MAX_HISTORY_LEN: 7}
    bicycle:    {MIN_HISTORY_LEN: 3, MAX_HISTORY_LEN: 6}
    motorcycle: {MIN_HISTORY_LEN: 3, MAX_HISTORY_LEN: 6}
    bus:        {MIN_HISTORY_LEN: 4, MAX_HISTORY_LEN: 8}
    trailer:    {MIN_HISTORY_LEN: 5, MAX_HISTORY_LEN: 8}
    truck:      {MIN_HISTORY_LEN: 4, MAX_HISTORY_LEN: 8}

MATCHING:
  BEV:
    COST_STATE: {0: "BackPredict", 1: "BackPredict", 2: "Predict", 3: "Fusion", 4: "Predict", 5: "BackPredict", 6: "BackPredict"}
    COST_MODE: {0: "RO_GDIOU_3D", 1: "RO_GDIOU_3D", 2: "RO_GDIOU_3D", 3: "RO_GDIOU_3D", 4: "RO_GDIOU_3D", 5: "RO_GDIOU_3D", 6: "RO_GDIOU_3D"}
    MATCHING_MODE: Hungarian
  RV:
    COST_STATE: {0: "Predict", 1: "Predict", 2: "Predict", 3: "Predict", 4: "Predict", 5: "Predict", 6: "Predict"}
    COST_MODE: {0: "SDIOU_2D", 1: "SDIOU_2D", 2: "SDIOU_2D", 3: "SDIOU_2D", 4: "SDIOU_2D", 5: "SDIOU_2D", 6: "SDIOU_2D"}
    MATCHING_MODE: Greedy

